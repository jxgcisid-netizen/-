<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全验证</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --dim: #888;
            --accent: #4ade80;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            transition: all 0.3s;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--dim);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }
        .btn-primary:hover {
            background: #e5e5e5;
        }

        .btn-ghost {
            background: transparent;
            color: var(--dim);
            border: 1px solid var(--border);
            margin-top: 8px;
        }
        .btn-ghost:hover {
            border-color: #555;
            color: #ccc;
        }

        /* 人机验证 */
        .captcha-display {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin: 24px 0;
            font-family: 'Courier New', monospace;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 12px;
            user-select: none;
            color: #fff;
            position: relative;
        }

        .captcha-display::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.01) 2px,
                rgba(255,255,255,0.01) 4px
            );
            border-radius: 8px;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #555;
        }
        .input-field::placeholder {
            color: #444;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }

        .hint {
            color: var(--dim);
            font-size: 12px;
            margin-top: 12px;
        }

        /* 确认卡片堆叠 */
        .confirm-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .confirm-item {
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .confirm-item .check-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #444;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .confirm-item .check-dot.checked {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-size: 12px;
        }

        .confirm-item .label {
            color: #ccc;
            font-size: 13px;
        }

        /* 进度条 */
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 20px 0 24px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* 加载动画 */
        .loading-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 16px 0;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #555;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ==================== 第一屏：入口 ==================== -->
    <div class="card" id="screen-intro">
        <div class="icon">🔐</div>
        <h2>安全验证</h2>
        <p class="subtitle">此页面需要验证您的身份后才能继续访问。<br>请点击下方按钮开始验证流程。</p>
        <button class="btn btn-primary" onclick="goScreen('captcha')">开始验证</button>
    </div>

    <!-- ==================== 第二屏：人机验证 ==================== -->
    <div class="card" id="screen-captcha" style="display:none;">
        <div class="icon">🤖</div>
        <h2>人机验证</h2>
        <p class="subtitle">请输入下方显示的验证码，证明您不是机器人</p>

        <div class="captcha-display">EZEZ</div>

        <input type="text" class="input-field" id="captchaInput" placeholder="输入验证码" maxlength="4" autocomplete="off">
        <p class="error-msg" id="captchaError">验证码不正确，请重试</p>
        <p class="hint">不区分大小写 · 看清楚再填</p>

        <div style="margin-top: 24px;">
            <button class="btn btn-primary" onclick="checkCaptcha()">确认</button>
            <button class="btn btn-ghost" onclick="goScreen('intro')">返回</button>
        </div>
    </div>

    <!-- ==================== 第三屏：多重确认 ==================== -->
    <div class="card" id="screen-confirm" style="display:none;">
        <div class="icon">⚠️</div>
        <h2 id="confirmTitle">确认操作</h2>
        <p class="subtitle" id="confirmDesc">请勾选以下所有确认项以继续</p>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <div class="confirm-stack" id="confirmStack"></div>

        <p class="error-msg" id="confirmError">请勾选所有确认项</p>

        <div style="margin-top: 16px;">
            <button class="btn btn-primary" id="btnConfirmNext" onclick="handleConfirmNext()">继续</button>
            <button class="btn btn-ghost" onclick="resetAll()">取消</button>
        </div>
    </div>

    <!-- ==================== 第四屏：加载跳转 ==================== -->
    <div class="card" id="screen-loading" style="display:none;">
        <div class="icon">✅</div>
        <h2>验证通过</h2>
        <p class="subtitle">正在为您加载内容...</p>
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
        <p style="color: #555; font-size: 12px; margin-top: 8px;">即将跳转</p>
    </div>

    <script>
        // ============ 确认项配置 ============
        const confirmSteps = [
            { label: '我确认要访问此页面', weight: 1 },
            { label: '我知道自己在做什么', weight: 1 },
            { label: '我愿意承担一切后果', weight: 1 },
            { label: '我不是误点进来的', weight: 1 },
            { label: '我准备好面对接下来的内容', weight: 1 },
            { label: '以上所有选项我都是认真勾选的，不是随便点的', weight: 1 },
        ];

        let currentStep = 0;
        const stepsPerPage = 3; // 每页显示几个确认项

        // ============ 屏幕切换 ============
        function goScreen(name) {
            ['intro', 'captcha', 'confirm', 'loading'].forEach(id => {
                document.getElementById('screen-' + id).style.display = 'none';
            });
            const target = document.getElementById('screen-' + name);
            if (target) target.style.display = 'block';

            if (name === 'confirm') {
                currentStep = 0;
                renderConfirmBatch();
            }
        }

        // ============ 人机验证 ============
        function checkCaptcha() {
            const input = document.getElementById('captchaInput').value.trim();
            const errorEl = document.getElementById('captchaError');

            if (input.toUpperCase() === 'EZEZ') {
                errorEl.classList.remove('show');
                document.getElementById('captchaInput').value = '';
                goScreen('confirm');
            } else {
                errorEl.classList.add('show');
                document.getElementById('captchaInput').value = '';
                document.getElementById('captchaInput').focus();
            }
        }

        // 回车提交
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('captchaInput');
            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') checkCaptcha();
                });
            }
        });

        // ============ 确认流程 ============
        function renderConfirmBatch() {
            const stack = document.getElementById('confirmStack');
            const title = document.getElementById('confirmTitle');
            const desc = document.getElementById('confirmDesc');
            const errorEl = document.getElementById('confirmError');
            const btn = document.getElementById('btnConfirmNext');
            const progressBar = document.getElementById('progressBar');

            errorEl.classList.remove('show');

            const start = currentStep;
            const end = Math.min(currentStep + stepsPerPage, confirmSteps.length);
            const batch = confirmSteps.slice(start, end);

            // 更新标题
            if (currentStep === 0) {
                title.textContent = '安全确认';
                desc.textContent = '请勾选以下确认项以继续';
            } else {
                title.textContent = '再次确认';
                desc.textContent = '还需要确认以下内容';
            }

            // 更新进度条
            const progress = Math.round((currentStep / confirmSteps.length) * 100);
            progressBar.style.width = progress + '%';

            // 渲染确认项
            stack.innerHTML = '';
            batch.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'confirm-item';
                div.innerHTML = `
                    <div class="check-dot" data-index="${start + i}" onclick="toggleCheck(this)"></div>
                    <span class="label">${item.label}</span>
                `;
                stack.appendChild(div);
            });

            // 按钮文字
            if (end >= confirmSteps.length) {
                btn.textContent = '完成验证';
            } else {
                btn.textContent = '继续';
            }
        }

        function toggleCheck(dot) {
            dot.classList.toggle('checked');
            dot.textContent = dot.classList.contains('checked') ? '✓' : '';
        }

        function handleConfirmNext() {
            const start = currentStep;
            const end = Math.min(currentStep + stepsPerPage, confirmSteps.length);
            const errorEl = document.getElementById('confirmError');

            // 检查当前页所有项是否都勾选
            const allChecked = [];
            for (let i = start; i < end; i++) {
                const dot = document.querySelector(`.check-dot[data-index="${i}"]`);
                allChecked.push(dot && dot.classList.contains('checked'));
            }

            if (allChecked.every(Boolean)) {
                errorEl.classList.remove('show');

                if (end >= confirmSteps.length) {
                    // 全部完成
                    goScreen('loading');
                    setTimeout(() => {
                        window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
                    }, 2500);
                } else {
                    // 下一批
                    currentStep = end;
                    renderConfirmBatch();
                }
            } else {
                errorEl.classList.add('show');
                document.getElementById('confirmError').textContent = '还有未勾选的项，请全部勾选后再继续';
            }
        }

        // ============ 重置 ============
        function resetAll() {
            currentStep = 0;
            goScreen('intro');
        }
    </script>

</body>
</html>
